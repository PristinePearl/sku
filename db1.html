  <script>
    // Constants and Global Variables
    const BATCH_URL = "https://script.google.com/macros/s/AKfycbx4hqFN0DhMDm22q0_EkS_E4EAApVavgZz8FEZEdUV0Jg0uMVaUUg3S8FyL9vy3H5KM/exec";
    const CURRENT_URL = "https://script.google.com/macros/s/AKfycbwSzWZ5E-DRulTQRFdiWWq_PAGCooPKXzugvvOiQvNPwNmfIMwzcZaYtA5_Mqo9SLkRXg/exec";
    
    let CURRENT_DATA_SOURCE = "BATCH"; // Default to batch wise
    let MERGED_SAVED = [];
    let FILTERED_DATA = []; // Always holds the detailed, batch-wise filtered data
    
    const dashboardContent = document.getElementById("dashboardContent");
    const loadingSpinner = document.getElementById("loadingSpinner");
    const fromDateInput = document.getElementById("fromDate");
    const toDateInput = document.getElementById("toDate");
    const switchBatch = document.getElementById("switchBatch");
    const switchCurrent = document.getElementById("switchCurrent");


    /**
     * Converts a date string into a reliable YYYY-MM-DD format for filtering, 
     * preventing timezone issues from shifting the day.
     * @param {string} dateString - The date string from the data.
     * @returns {string} Date in 'YYYY-MM-DD' format or empty string.
     */
function getFormattedDate(value) {
    if (!value) return '';

    let date;

    // ✅ If value is a Google Sheet serial number
    if (typeof value === 'number') {
        // Google Sheets epoch: 1899-12-30
        date = new Date(Math.round((value - 25569) * 86400 * 1000));
    } 
    // ✅ If value is already a date string
    else {
        date = new Date(value);
    }

    if (isNaN(date)) return '';

    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');

    return `${year}-${month}-${day}`;
}

/* ==============================
   INDIAN NUMBER FORMATTER
============================== */
function formatIndianNumber(value) {
  const num = Number(value || 0);

  if (!num) return "-"; // if 0 → "-"

  return num.toLocaleString("en-IN");
}


    /**
     * Displays a styled message box for user feedback.
     */
    function showMessage(msg, type = 'info') {

      box.innerText = msg;
      box.classList.remove('hidden');

      if (type === 'error') {
        box.className = 'p-4 mb-6 rounded-lg font-medium shadow-md bg-red-100 border border-red-400 text-red-700';
      } else {

      }
      
      setTimeout(() => box.classList.add('hidden'), 4000);
    }

    /**
     * Groups data for the Consolidated view and SORTS it by Item Name.
     */
    function groupDataConsolidated(data) {
        const aggregated = {};

        data.forEach(r => {
            // Group by item code and division code
            const key = r["Item Code"] + "||" + r["Div Code"]; 
            
            if (!aggregated[key]) {
                aggregated[key] = {
                    "Date": r["Date"],
                    "Div Code": r["Div Code"],
                    "Div Name": r["Div Name"],
                    "Item Code": r["Item Code"],
                    "Item Name": r["Item Name"],
                    "MRP": r["MRP"], // Keep one MRP (assuming it's constant per item)
                    "Kerala": 0,
"Palepu": 0,
"Coimbatore": 0,
"Bangalore": 0,
"Total Quantity": 0,
                };
            }

            // Sum up the quantities
            aggregated[key]["Kerala"] += Number(r["Kerala"] || 0);
            aggregated[key]["Palepu"] += Number(r["Palepu"] || 0);
            aggregated[key]["Coimbatore"] += Number(r["Coimbatore"] || 0);
            aggregated[key]["Bangalore"] += Number(r["Bangalore"] || 0);
            aggregated[key]["Total Quantity"] += Number(r["Total Quantity"] || 0);
        });

        const aggregatedArray = Object.values(aggregated);

        // --- SORTING: Sort alphabetically by Item Name ---
        aggregatedArray.sort((a, b) => {
            const nameA = a["Item Name"].toUpperCase();
            const nameB = b["Item Name"].toUpperCase();
            if (nameA < nameB) return -1;
            if (nameA > nameB) return 1;
            return 0;
        });
        // --- END SORTING ---

        return aggregatedArray;
    }

    /**
     * Renders the data into the table, adjusting for view mode.
     * Ensures consistent text alignment (Left for text, Right for numbers, Center for dates/types).
     */
    function renderTable(data, selectedDepot = "", viewMode = "Consolidated") {
      const tableBody = document.getElementById("reportTable");
      const tableHeader = document.getElementById("reportTableHeader");
      let htmlBody = "";
      
      const isConsolidated = viewMode === "Consolidated";
      const isBatch = CURRENT_DATA_SOURCE === "BATCH";

      // --- 1. Define Headers with Alignment ---
      const baseHeaders = [
        { name: "Date", key: "Date", align: "left" }, 
        { name: "Div Code", key: "Div Code", align: "left" }, 
        { name: "Div Name", key: "Div Name", align: "left" }, 
        { name: "Item Code", key: "Item Code", align: "left" }, 
        { name: "Item Name", key: "Item Name", align: "left" }, 
        { name: "MRP", key: "MRP", align: "right" }, 
        { name: "Direct Billing", key: "Kerala", align: "right" }, 
        { name: "Depot CBE", key: "Palepu", align: "right" }, 
        { name: "HO", key: "Coimbatore", align: "right" }, 
        { name: "Bangalore", key: "Bangalore", align: "right" }, 
        { name: "Total Qty", key: "Total Quantity", align: "right" },
        { name: "Total Value", key: "Total Value", align: "right" }
      ];

      // Batch/Expiry details are only available and relevant for Batch Wise data
      const detailedInserts = isBatch ? [
        { name: "Batch No", key: "Batch No", align: "left" },
        { name: "Expiry (MM-YYYY)", key: "Expiry (MM-YYYY)", align: "center" },
      ] : [];
      
      const expiryTypeInsert = isBatch ? { name: "Expiry Type", key: "Expiry Type", align: "center" } : null;

      let headers;
      if (isConsolidated) {
          headers = baseHeaders;
      } else {
          // Detailed: Date..Item Name + [Batch + Expiry Date] + MRP..Total Qty + [Expiry Type]
          const firstPart = baseHeaders.slice(0, 5); // Date to Item Name
          const secondPart = baseHeaders.slice(5); // MRP to Total Qty
          headers = [...firstPart, ...detailedInserts, ...secondPart];
          if (expiryTypeInsert) {
              headers.push(expiryTypeInsert);
          }
      }

    /**
     * Computes and updates all summary cards from the raw (batch-level) filtered data.
     */
    function updateSummaryCards(data, selectedDepot) {
      const cards = document.getElementById("summaryCards");
      if (!data || data.length === 0) {
        cards.classList.add("hidden");
        return;
      }
      cards.classList.remove("hidden");

      const isBatch = CURRENT_DATA_SOURCE === "BATCH";

      // Unique products by Item Code
      const uniqueProducts = new Set(data.map(r => r["Item Code"])).size;

      // Totals
      let totalQty = 0, totalValue = 0;
      let kerala = 0, palepu = 0, coimbatore = 0, bangalore = 0;
      let expired = 0, shortExp = 0, longExp = 0;

      data.forEach(r => {
        const qty   = Number(r["Total Quantity"] || 0);
        const mrp   = parseFloat(r["MRP"] || 0);
        const kQty  = !selectedDepot || selectedDepot === "Kerala"      ? Number(r["Kerala"]      || 0) : 0;
        const pQty  = !selectedDepot || selectedDepot === "Palepu"      ? Number(r["Palepu"]      || 0) : 0;
        const cQty  = !selectedDepot || selectedDepot === "Coimbatore"  ? Number(r["Coimbatore"]  || 0) : 0;
        const bQty  = !selectedDepot || selectedDepot === "Bangalore"   ? Number(r["Bangalore"]   || 0) : 0;

        // For value, use the qty that is visible (sum of visible depot cols)
        const visibleQty = selectedDepot ? (Number(r[selectedDepot] || 0)) : qty;

        totalQty   += visibleQty;
        totalValue += mrp * visibleQty;
        kerala     += kQty;
        palepu     += pQty;
        coimbatore += cQty;
        bangalore  += bQty;

        if (isBatch) {
          const et = r["Expiry Type"] || "";
          if (et === "Expired") expired += visibleQty;
          else if (et === "Short") shortExp += visibleQty;
          else if (et === "Long")  longExp  += visibleQty;
        }
      });

      const fmt = v => v ? v.toLocaleString("en-IN") : "0";
      const fmtVal = v => {
        if (!v) return "₹0";
        if (v >= 1e7) return "₹" + (v / 1e7).toFixed(2) + " Cr";
        if (v >= 1e5) return "₹" + (v / 1e5).toFixed(2) + " L";
        return "₹" + v.toLocaleString("en-IN", { maximumFractionDigits: 0 });
      };

      document.getElementById("sc-products").textContent   = fmt(uniqueProducts);
      document.getElementById("sc-totalqty").textContent   = fmt(totalQty);
      document.getElementById("sc-totalvalue").textContent = fmtVal(totalValue);
      document.getElementById("sc-kerala").textContent     = fmt(kerala);
      document.getElementById("sc-palepu").textContent     = fmt(palepu);
      document.getElementById("sc-coimbatore").textContent = fmt(coimbatore);
      document.getElementById("sc-bangalore").textContent  = fmt(bangalore);

      // Expiry cards: only meaningful in batch mode
      const expiredEl = document.getElementById("sc-expired").parentElement;
      const shortEl   = document.getElementById("sc-short").parentElement;
      const longEl    = document.getElementById("sc-long").parentElement;

      if (isBatch) {
        document.getElementById("sc-expired").textContent = fmt(expired);
        document.getElementById("sc-short").textContent   = fmt(shortExp);
        document.getElementById("sc-long").textContent    = fmt(longExp);
        expiredEl.style.opacity = "1";
        shortEl.style.opacity   = "1";
        longEl.style.opacity    = "1";
      } else {
        document.getElementById("sc-expired").textContent = "N/A";
        document.getElementById("sc-short").textContent   = "N/A";
        document.getElementById("sc-long").textContent    = "N/A";
        expiredEl.style.opacity = "0.4";
        shortEl.style.opacity   = "0.4";
        longEl.style.opacity    = "0.4";
      }
    }

      // FILTERED_DATA is the detailed, batch-wise subset.

        let dateMatch = true;
const recordDate = getFormattedDate(r["Date"]);

if (fd || td) {
  dateMatch = (!fd || recordDate >= fd) && (!td || recordDate <= td);
}
        
        // Division Code Filter: Match if checkedDivCodes is empty (All selected) or if the record's code is in the checked list
        const recordDivCode = r["Div Code"];
        const divCodeMatch = checkedDivCodes.length === 0 || checkedDivCodes.includes(recordDivCode); 
        
        const productMatch = !prod || r["Item Name"] === prod;
        // Check if stock exists at the filtered depot (if a depot is selected)
        const depotMatch = !depot || (r.hasOwnProperty(depot) && Number(r[depot] || 0) > 0); 
        
        // Expiry Type Filter (only apply if in Batch mode)
        const recordExpiryType = r["Expiry Type"] || "";
        const expiryMatch = !isBatch || checkedExpiryTypes.length === 0 || checkedExpiryTypes.includes(recordExpiryType);

        return dateMatch && divCodeMatch && productMatch && depotMatch && expiryMatch; 
      });

      // --- 2. Group or Use Filtered Data for Rendering ---
      let dataToRender = FILTERED_DATA;
      if (viewMode === 'Consolidated') {

          dataToRender = groupDataConsolidated(FILTERED_DATA);

    return res.json();

  .then(json => {
    updateProgress(60, "Processing...");

    MERGED_SAVED = json;

    // ── Smart date default: today if available, else latest date ──
    setSmartDefaultDates(json);

    // ── Auto-filter to the chosen default date ──
    const dateVal = fromDateInput.value;
    FILTERED_DATA = dateVal
      ? json.filter(r => getFormattedDate(r["Date"]) === dateVal)
      : json;

    updateProgress(80, "Preparing filters...");
    populateFilters(json); // always populate from full dataset

    updateProgress(90, "Rendering...");

    // rAF lets the browser paint the progress bar before the heavy DOM work
    requestAnimationFrame(() => {
      const consolidatedData = groupDataConsolidated(FILTERED_DATA);
      renderTable(consolidatedData, "", "Consolidated");

      updateProgress(100, "Ready ✓");
      loadingSpinner.classList.add('hidden');
      dashboardContent.classList.remove('hidden');
      showMessage(`Loaded ${FILTERED_DATA.length} records for ${dateVal || 'all dates'}.`);
    });
  })
  .catch(e => {
    console.error("Fetch error:", e);
    loadingSpinner.classList.add('hidden');
    dashboardContent.classList.remove('hidden');
    showMessage("Failed to load data.", "error");
  });
    }

function exportProductWiseExpiryReport() {

  if (!FILTERED_DATA || FILTERED_DATA.length === 0) {
    showMessage("No batch data to export. Apply filter first.", "error");
    return;
  }

  // ── Updated depot order ──
  const DEPOTS = ["Coimbatore", "Bangalore", "Kerala", "Palepu"];
  const DEPOT_LABELS = { "Coimbatore": "HO", "Bangalore": "Bangalore", "Kerala": "Direct Billing", "Palepu": "Depot CBE" };

  /* ===============================
     COLLECT EXPIRY HEADERS
  =============================== */
  const MONTHS = [...new Set(
    FILTERED_DATA.map(r => r["Expiry (MM-YYYY)"]).filter(Boolean)
  )].sort((a, b) => {
    const [am, ay] = a.split('-').map(Number);
    const [bm, by] = b.split('-').map(Number);
    return ay !== by ? ay - by : am - bm;
  });

  if (!MONTHS.length) {
    showMessage("No expiry data found.", "error");
    return;
  }

  /* ===============================
     HELPERS
  =============================== */
  // TOTAL first, then months
  const initMonthCols = obj => {
    obj["TOTAL"] = 0;
    MONTHS.forEach(m => obj[m] = 0);
  };

  /* ===============================
     SHEET 1 — DEPOT SUMMARY
  =============================== */
  const S2 = {};

  FILTERED_DATA.forEach(r => {
    const code = r["Item Code"];
    const name = r["Item Name"];
    const m    = r["Expiry (MM-YYYY)"];
    if (!code || !m) return;

    DEPOTS.forEach(depot => {
      const qty = Number(r[depot] || 0);
      if (qty <= 0) return;

      const key = depot + "_" + code;

if (!S2[key]) {
    S2[key] = { "Depot": DEPOT_LABELS[depot], "Product Code": code, "Product Name": name };
        initMonthCols(S2[key]);
      }

      S2[key][m] += qty;
      S2[key]["TOTAL"] += qty;
    });
  });

  /* ===============================
     SHEET 2–5 — DEPOT BREAKUPS
  =============================== */
  const DEPOT_SHEETS = {};
  DEPOTS.forEach(d => DEPOT_SHEETS[d] = {});

  FILTERED_DATA.forEach(r => {
    const code  = r["Item Code"];
    const name  = r["Item Name"];
    const batch = r["Batch No"];
    const m     = r["Expiry (MM-YYYY)"];
    if (!code || !batch || !m) return;

    DEPOTS.forEach(depot => {
      const qty = Number(r[depot] || 0);
      if (qty <= 0) return;

      const key = code + "_" + batch;

      if (!DEPOT_SHEETS[depot][key]) {
        DEPOT_SHEETS[depot][key] = { "Product Code": code, "Product Name": name, "Batch": batch };
        initMonthCols(DEPOT_SHEETS[depot][key]);
      }

      DEPOT_SHEETS[depot][key][m] += qty;
      DEPOT_SHEETS[depot][key]["TOTAL"] += qty;
    });
  });

  /* ===============================
     EXCEL STYLING HELPER
     Applies bold headers, bold TOTAL col,
     number formatting, freeze panes
  =============================== */
  function buildStyledSheet(dataRows, freezeCol) {
    if (!dataRows.length) return XLSX.utils.json_to_sheet([]);

    // ── Build header keys in correct order from first row ──
    const keys = Object.keys(dataRows[0]);

    // ── Convert to array-of-arrays for full control ──
    const aoa = [keys]; // header row
    dataRows.forEach(row => aoa.push(keys.map(k => row[k] ?? "")));

    const ws = XLSX.utils.aoa_to_sheet(aoa);

    const nRows = aoa.length;
    const nCols = keys.length;

    // ── Column widths ──
    ws['!cols'] = keys.map((k, i) => {
      if (i === 0) return { wch: 18 }; // Depot / Product Code
      if (i === 1) return { wch: 14 };
      if (i === 2) return { wch: 36 }; // Product Name / Batch
      return { wch: 12 };
    });

    // ── Freeze: row 1 + first `freezeCol` columns ──
    ws['!freeze'] = { xSplit: freezeCol, ySplit: 1, topLeftCell: XLSX.utils.encode_cell({ r: 1, c: freezeCol }), activePane: "bottomRight", state: "frozen" };
    // SheetJS uses !freeze for newer builds; also set via !panes for compatibility
    ws['!panes'] = [{ xSplit: freezeCol, ySplit: 1, topLeftCell: XLSX.utils.encode_cell({ r: 1, c: freezeCol }), activePane: "bottomRight", state: "frozen" }];

    // ── Find TOTAL column index ──
    const totalColIdx = keys.indexOf("TOTAL");

    // ── Style every cell ──
    for (let R = 0; R < nRows; R++) {
      for (let C = 0; C < nCols; C++) {
        const addr = XLSX.utils.encode_cell({ r: R, c: C });
        if (!ws[addr]) ws[addr] = { t: 's', v: '' };

        const isHeader   = R === 0;
        const isTotalCol = C === totalColIdx;
        const isNumeric  = R > 0 && typeof aoa[R][C] === 'number';
        const isZero     = R > 0 && aoa[R][C] === 0;

        // Format numbers (Indian style for display)
        if (R > 0 && typeof aoa[R][C] === 'number') {
          ws[addr].t = 'n';
          ws[addr].v = aoa[R][C];
          // Use Indian number format: show as number with comma grouping
          ws[addr].z = isZero ? '"-"' : '#,##,##0';
        }

        ws[addr].s = {
          font: {
            bold: isHeader || isTotalCol,
            sz: isHeader ? 11 : 10,
            color: isHeader ? { rgb: "FFFFFF" } : isTotalCol ? { rgb: "1D3557" } : { rgb: "000000" }
          },
          fill: {
            patternType: "solid",
            fgColor: isHeader
              ? { rgb: "1F2937" }          // dark header
              : isTotalCol
                ? { rgb: "DBEAFE" }        // light blue for total col
                : R % 2 === 0
                  ? { rgb: "FFFFFF" }
                  : { rgb: "F9FAFB" }
          },
          alignment: {
            horizontal: (isHeader || C <= 2) ? "left" : "right",
            vertical: "center",
            wrapText: false
          },
          border: {
            bottom: { style: "thin", color: { rgb: "E5E7EB" } },
            right:  { style: "thin", color: { rgb: "E5E7EB" } }
          }
        };
      }
    }

    return ws;
  }

  /* ===============================
     BUILD WORKBOOK
  =============================== */
  const wb = XLSX.utils.book_new();

  // Sheet 1 — Depot Summary (freeze col C = index 3: after Depot, ProdCode, ProdName)
  XLSX.utils.book_append_sheet(wb, buildStyledSheet(Object.values(S2), 3), "Depot Summary");

  // Sheets 2–5 — Individual depots (freeze col C = index 3: after ProdCode, ProdName, Batch)
  DEPOTS.forEach((d, i) => {
    XLSX.utils.book_append_sheet(
      wb,
      buildStyledSheet(Object.values(DEPOT_SHEETS[d]), 3),
      `Depot ${i + 1} - ${DEPOT_LABELS[d]}`
    );
  });

  XLSX.writeFile(wb, `MonthWiseProductExpiry_${new Date().toISOString().split("T")[0]}.xlsx`);
  showMessage("Month Wise Product Expiry report exported successfully.");
}
/* ============================================================
   PRODUCT AUTO-SUGGEST LOGIC
============================================================ */
(function() {
  let activeIdx = -1;

  const input    = document.getElementById("productFilterInput");
  const hidden   = document.getElementById("productFilter");
  const list     = document.getElementById("productSuggestList");
  const clearBtn = document.getElementById("productFilterClear");

  function highlight(text, query) {
    if (!query) return text;
    const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return text.replace(re, '<mark>$1</mark>');
  }

  function renderList(matches, query) {
    list.innerHTML = '';
    activeIdx = -1;
    if (matches.length === 0) {
      list.innerHTML = '<li class="no-match">No products found</li>';
    } else {
      matches.forEach((p) => {
        const li = document.createElement('li');
        li.innerHTML = highlight(p, query);
        li.dataset.value = p;
        li.addEventListener('mousedown', (e) => {
          e.preventDefault();
          selectProduct(p);
        });
        list.appendChild(li);
      });
    }
    list.classList.remove('hidden');
  }

  function selectProduct(name) {
    input.value  = name;
    hidden.value = name;
    clearBtn.classList.remove('hidden');
    list.classList.add('hidden');
    activeIdx = -1;
  }

  window.clearProductFilter = function() {
    input.value  = '';
    hidden.value = '';
    clearBtn.classList.add('hidden');
    list.classList.add('hidden');
    activeIdx = -1;
    input.focus();
  };

  input.addEventListener('input', function() {
    const q = this.value.trim();
    hidden.value = '';
    clearBtn.classList.toggle('hidden', q === '');
    const all = window._allProducts || [];
    if (!q) { list.classList.add('hidden'); return; }
    const matches = all.filter(p => p.toLowerCase().includes(q.toLowerCase()));
    renderList(matches, q);
  });

  input.addEventListener('focus', function() {
    const q = this.value.trim();
    if (q && (window._allProducts || []).length) {
      const matches = (window._allProducts || []).filter(p => p.toLowerCase().includes(q.toLowerCase()));
      renderList(matches, q);
    }
  });

  input.addEventListener('keydown', function(e) {
    const items = list.querySelectorAll('li:not(.no-match)');
    if (!items.length) return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      activeIdx = Math.min(activeIdx + 1, items.length - 1);
      items.forEach((li, i) => li.classList.toggle('active', i === activeIdx));
      items[activeIdx]?.scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      activeIdx = Math.max(activeIdx - 1, 0);
      items.forEach((li, i) => li.classList.toggle('active', i === activeIdx));
      items[activeIdx]?.scrollIntoView({ block: 'nearest' });
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (activeIdx >= 0 && items[activeIdx]) {
        selectProduct(items[activeIdx].dataset.value);
      }
    } else if (e.key === 'Escape') {
      list.classList.add('hidden');
      activeIdx = -1;
    }
  });

  document.addEventListener('click', function(e) {
    if (!document.getElementById("productFilterWrapper").contains(e.target)) {
      list.classList.add('hidden');
    }
  });
})();
